name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      # ponytail: pin actions to immutable commit SHAs resolved at implementation
      # time; do not leave a floating @v4 tag.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --runInBand
      - run: npm run build
      - if: matrix.node == 24
        run: npm audit --audit-level=moderate
      - if: matrix.node == 24
        run: npm run smoke
